; VECTOR ESP32 node — smart-home actuator + sensor over MQTT.
; Build & flash:  pio run -t upload   (then  pio device monitor)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
