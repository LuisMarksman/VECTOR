# Mosquitto configuration for the VECTOR message bus.
# Used by docker-compose (mounted into the `mqtt` service).

# Standard MQTT.
listener 1883
protocol mqtt

# MQTT over WebSockets (handy for web dashboards).
listener 9001
protocol websockets

# Development default: allow anonymous clients.
# For anything exposed beyond localhost, create a password file instead:
#   mosquitto_passwd -c /mosquitto/config/passwd vector
# then set:  allow_anonymous false  and  password_file /mosquitto/config/passwd
allow_anonymous true

# Persist retained messages and subscriptions across restarts.
persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mqtt` works.
log_dest stdout
log_type warning
log_type notice
log_type information
